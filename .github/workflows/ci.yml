name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: black --check .

      - name: Type check
        run: mypy src/

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=70

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t senegal-rental-api:ci .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t senegal-rental-frontend:ci .

  docker-push:
    runs-on: ubuntu-latest
    needs: quality
    # Publication uniquement depuis main (pas sur les PR, pour éviter que
    # n'importe quelle branche externe puisse pousser une image)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/senegal-rental-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/senegal-rental-api:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/senegal-rental-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/senegal-rental-frontend:${{ github.sha }}